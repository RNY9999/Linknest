services:
  api:
    build:
      context: .
    container_name: linknest-api
    # .env の PORT を使う（未定義なら 9989）
    ports:
      - "${PORT:-9989}:${PORT:-9989}"
      - 5555:5555
    env_file:
      - .env
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: ["npm", "run", "dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - linknest

  postgres:
    image: postgres:16-alpine
    container_name: "linknest-postgres"
    restart: always
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - linknest

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--requirepass", "${REDIS_PASSWORD}"]
    ports: # 開発環境のみ使用, 本番・準本番ではPORTを公開しない
      - ${REDIS_PORT:-6379}:${REDIS_PORT:-6379}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - linknest

volumes:
  node_modules:
  postgres-data:

networks:
  linknest:
    driver: bridge

