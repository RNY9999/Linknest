version: '3.8'

services:
  api:
    build:
      context: .
    container_name: linknest-api
    # .env の PORT を使う（未定義なら 9989）
    ports:
      - "${PORT:-9989}:${PORT:-9989}"
      - 5555:5555
    env_file:
      - .env
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: "linknest-postgres"
    restart: always
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  node_modules:
  postgres-data:

