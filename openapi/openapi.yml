openapi: '3.0.3'

info:
  title: Linknest 管理者 API
  description: |
    ## Linknest 管理者 API仕様書（envelope対応）
    - すべてのJSONレスポンスを、共通エンベロープ（success/code/message/requestId/timestamp）に統一。
    - 成功時は `data`（必要に応じて `meta`）を返却。失敗時は `errors`/`details` を返却。
    ---
    ## サーバに関して
    現在は開発環境しか用意していないためAPIのテストも開発環境でのみ行う。<br>
    今後準本番（stg）や本番（prod）環境を作成次第テスト実施予定。
  version: '1.0.0'

servers:
  - url: http://localhost:5000
    description: 開発環境URL

tags:
  - name: Admin / Session
    description: 管理者セッション（ログイン/ログアウト/セッション確認）
  - name: Admin / Admins
    description: 管理者アカウント（新規登録 / 情報取得 / 編集 / 削除）
  - name: Admin / Admin-Statuses
    description: 管理者ステータスマスタ取得（GETメソッドのみ実装）
  - name: Server Running Test
    description: サーバ疎通確認用

paths:
  /api/admin/session:
    get:
      tags:
        - Admin / Session
      summary: 管理者ログインチェック
      operationId: adminLoginCheck
      description: |
        Cookie `ln_admin_sid` を検証し、セッションの有効性（valid）を返す。<br>
        このエンドポイントでは原則 Set-Cookie を返さない。<br>
        response 500 の場合発生するのは InternalServerError のみ<br>
        ※component の関係でその他の500error の例が載っています。
      security:
        - Cookie_ln_admin_sid: []
          Cookie_admin_status: []
      responses:
        '200':
          description: 有効なセッション
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStatusResponse'
              examples:
                fullSession:
                  summary: 通常（full）セッション
                  value:
                    success: true
                    code: "OK"
                    message: "有効なセッションです"
                    data:
                      valid: true
                      expiresAt: "2025-08-18T06:00:00Z"
                      admin:
                        adminStatus: 3
                        id: 2
                        email: "linknest@example.com"
                        displayName: "テスト管理者"
                    meta: {}
                    requestId: "req_abc123"
                    timestamp: "2025-10-27T10:45:12.345Z"
                preOtpSession:
                  summary: pre-otpセッション（初回ログイン時・OTP未完了）
                  value:
                    success: true
                    code: "OK"
                    message: "有効なセッションです"
                    data:
                      valid: true
                      expiresAt: "2025-08-18T06:00:00Z"
                      admin:
                        adminStatus: 1
                        id: 3
                        email: "first-login@example.com"
                        displayName: "初回ログインテスト管理者"
                    meta: {}
                    requestId: "req_abc234"
                    timestamp: "2025-10-27T10:45:12.345Z"
        '401':
          $ref: '#/components/responses/InvalidSession'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Admin / Session
      summary: 管理者ログイン
      operationId: adminLogin
      description: |
        認証に成功するとサーバ側でセッションを作成し、`HttpOnly`クッキーとして返却する。<br>
        OTP必須のユーザは202で応答し、OTP入力画面へ誘導する。<br>
        CSRFトークンはレスポンスの `meta.csrfToken` に含めて返却する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              normal:
                summary: 正常ログイン
                value:
                  email: linknest@example.com
                  password: Asdf1234!
              wrongPassword:
                summary: 認証失敗（パスワード間違い）
                value:
                  email: linknest@example.com
                  password: wrongPassword
      responses:
        '200':
          description: ログイン成功・セッション確立
          headers:
            Set-Cookie:
              $ref: '#/components/headers/AdminSessionCookie'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
              examples:
                normal:
                  value:
                    success: true
                    code: "OK"
                    message: "ログインに成功しました。"
                    data:
                      nextPath: "/top"
                      admin:
                        id: 2
                        email: "linknest@example.com"
                        displayName: "テスト管理者"
                    meta:
                      csrfToken: "csrf_token"
                    requestId: "req_login_ok"
                    timestamp: "2025-10-27T10:45:12.345Z"
        '202':
          description: |
            OTP認証が必要（初回ログイン時等）<br>
            初回ログイン時のセッションを確立。<br>
            ※初回ログイン完了時はセッションをローテーション（Session Fixation対策）。<br>
            CSRFトークンはレスポンスの `meta.csrfToken` に含めて返却する。
          headers:
            Set-Cookie:
              $ref: '#/components/headers/AdminSessionCookie'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpRequiredResponse'
              examples:
                first_login:
                  value:
                    success: true
                    code: "OK"
                    message: "OTP認証が必要です"
                    data:
                      nextPath: "/login/first/otp/send"
                      otpDeliveryAddress: "linknest@example.com"
                    meta:
                      csrfToken: "csrf_token"
                    requestId: "req_login_otp"
                    timestamp: "2025-10-27T10:45:12.345Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '423':
          $ref: '#/components/responses/MaxRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Admin / Session
      summary: ログアウト
      description: |
        サーバ側のセッションを無効化し、Cookieを削除する。<br>
        成功時は204(No Content)を返し、クライアントをログイン画面へ誘導する。<br>
        リクエスト時には直前に発行された CSRF トークンを `X-CSRF-Token` ヘッダに付与する。
      security:
        - Cookie_ln_admin_sid: []
        - Cookie_admin_status: []
        - CsrfTokenInHeader: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      responses:
        '204':
          description: ログアウト成功
          headers:
            Set-Cookie:
              description: セッションCookie削除
              schema:
                type: string
                example: "ln_admin_sid=; Path=/; HttpOnly; Secure; SameSite=None; Max-Age=0"
            Cache-Control:
              $ref: '#/components/headers/NoStore'
        '400':
          $ref: '#/components/responses/CsrfMissing'
        '401':
          $ref: '#/components/responses/InvalidSession'
        '403':
          $ref: '#/components/responses/CsrfForbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/session/refresh:
    post:
      tags:
        - Admin / Session
      summary: セッション延長（スライディング） / CSRFトークンのローテーション
      description: |
        有効なセッションおよび有効な CSRF トークンがある場合に、セッション有効期限を延長する。<br>
        CSRFトークンは毎回新しい値を発行し、レスポンスの `meta.csrfToken` に返却する。<br>
        ※2xxの場合のみ CSRF トークンをローテーションする。
      security:
        - Cookie_ln_admin_sid: []
        - Cookie_admin_status: []
        - CsrfTokenInHeader: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      responses:
        '200':
          description: セッション延長（延長が不要でも CSRF は毎回ローテーション）
          headers:
            Set-Cookie:
              $ref: '#/components/headers/AdminSessionCookie' # 必要時のみ新規で発行
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
              examples:
                refreshed:
                  value:
                    success: true
                    code: "OK"
                    message: "セッションを延長しました"
                    data:
                      refreshed: true
                      expiresAt: "2025-08-19T10:00:00Z"
                    meta:
                      csrfToken: "new_csrf_token"
                    requestId: "req_refresh_ok"
                    timestamp: "2025-10-27T10:45:12.345Z"
        '400':
          $ref: '#/components/responses/CsrfMissing'
        '401':
          $ref: '#/components/responses/InvalidSession'
        '403':
          $ref: '#/components/responses/CsrfForbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/admins:
    get:
      tags:
        - Admin / Admins
      summary: 管理者一覧取得
      operationId: getAdminList
      description: |
        管理者一覧を取得する。<br>
        検索条件・ソート条件・ページネーションを指定可能。<br>
        デフォルトソートは `adminId desc`。<br>
        最終ログイン日時 (`lastLoginAt`) のソートは以下の通り。<br>
        - asc: NULL を先頭
        - desc: NULL を末尾
      security:
        - Cookie_ln_admin_sid: []
          Cookie_admin_status: []
      parameters:
        - $ref: '#/components/parameters/AdminIdQuery'
        - $ref: '#/components/parameters/AdminEmailQuery'
        - $ref: '#/components/parameters/AdminDisplayNameQuery'
        - $ref: '#/components/parameters/AdminStatusIdQuery'
        - $ref: '#/components/parameters/AdminSortByQuery'
        - $ref: '#/components/parameters/AdminSortOrderQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PerPageQuery'
      responses:
        '200':
          description: 管理者一覧取得成功
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminListResponse'
              examples:
                default:
                  summary: デフォルト取得
                  value:
                    success: true
                    code: "OK"
                    message: "管理者一覧を取得しました。"
                    data:
                      items:
                        - adminId: 12
                          email: "z-admin@example.com"
                          displayName: "管理者Z"
                          status:
                            statusId: 3
                            label: "本登録"
                            isLocked: false
                            displayLabel: "本登録"
                          lastLoginAt: "2026-02-08T12:34:56.000Z"
                          createdAt: "2026-01-15T09:00:00.000Z"
                          isMe: false
                        - adminId: 11
                          email: "a-admin@example.com"
                          displayName: "管理者A"
                          status:
                            statusId: 4
                            label: "本登録"
                            isLocked: true
                            displayLabel: "本登録（ロック中）"
                          lastLoginAt: null
                          createdAt: "2026-01-10T09:00:00.000Z"
                          isMe: true
                    meta:
                      total: 4
                      page: 1
                      perPage: 20
                    requestId: "req_admin_list_ok"
                    timestamp: "2026-03-23T10:00:00.000Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/InvalidSession'
        '500':
          $ref: '#/components/responses/InternalServerErrorServerErrorOnly'

    post:
      tags:
        - Admin / Admins
      summary: 管理者アカウントの新規登録
      description: |
        管理者アカウント新規発行用のエンドポイント<br>
        登録したアカウントはステータスID : 1（仮登録）状態で登録される<br>
        登録に必要な情報は email / password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 新規登録（仮登録）完了
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterSuccessResponse'
              examples:
                仮登録完了:
                  value:
                    success: true
                    code: "CREATED"
                    message: "仮登録完了"
                    data:
                      nextPath: "/register/completed"
                    meta: {}
                    requestId: "req_register_id"
                    timestamp: "2025-12-14T12:42:12.440Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/ConflictAdmin'
        '500':
          $ref: '#/components/responses/InternalServerErrorServerErrorOnly'

  /api/admin/admins/{adminId}:
    get:
      tags:
        - Admin / Admins
      summary: 管理者詳細取得
      operationId: getAdminDetail
      description: |
        指定した管理者IDの詳細情報を取得する。<br>
        基本情報、セキュリティ情報、ログイン履歴を返却する。<br>
        ログイン履歴は最新20件を返却する。
      security:
        - Cookie_ln_admin_sid: []
          Cookie_admin_status: []
      parameters:
        - $ref: '#/components/parameters/AdminIdPath'
      responses:
        '200':
          description: 管理者詳細取得成功
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDetailResponse'
              examples:
                default:
                  summary: 管理者詳細取得成功
                  value:
                    success: true
                    code: "OK"
                    message: "管理者詳細を取得しました。"
                    data:
                      admin:
                        adminId: "12"
                        email: "hisamatsu@example.com"
                        displayName: "久松"
                        status:
                          statusId: 3
                          label: "本登録"
                          isLocked: false
                          displayLabel: "本登録"
                        lastLoginAt: "2026-02-08T12:34:56.000Z"
                        createdAt: "2026-01-01T09:00:00.000Z"
                        updatedAt: "2026-02-08T13:00:00.000Z"
                        isMe: false
                      security:
                        otpExpiredAt: null
                        otpFailureCount: 0
                        loginFailureCount: 1
                        lastLoginFailedAt: "2026-02-08T11:50:00.000Z"
                        lastLoginAt: "2026-02-08T12:34:56.000Z"
                      loginLogs:
                        - occurredAt: "2026-02-08T12:34:56.000Z"
                          status: "success"
                          statusLabel: "成功"
                          ipAddress: "192.168.0.1"
                          userAgent: "Mozilla/5.0 ..."
                        - occurredAt: "2026-02-08T11:50:00.000Z"
                          status: "failure"
                          statusLabel: "失敗"
                          ipAddress: "192.168.0.2"
                          userAgent: "Mozilla/5.0 ..."
                      permissions:
                        canEdit: true
                        canDelete: true
                    meta: {}
                    requestId: "req_admin_detail_ok"
                    timestamp: "2026-04-03T11:00:00.000Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/InvalidSession'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerErrorServerErrorOnly'

    patch:
      tags:
        - Admin / Admins
      summary: 管理者編集
      operationId: updateAdmin
      description: |
        指定した管理者IDの情報を更新する。<br>
        更新対象はメールアドレス、表示名、ステータスID。<br>
        ログイン中の管理者自身はこのAPIでは更新できない。
      security:
        - Cookie_ln_admin_sid: []
          Cookie_admin_status: []
          CsrfTokenInHeader: []
      parameters:
        - $ref: '#/components/parameters/AdminIdPath'
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateRequest'
            examples:
              default:
                summary: 管理者更新
                value:
                  email: "updated@example.com"
                  displayName: "更新後表示名"
                  statusId: 3
      responses:
        '200':
          description: 管理者更新成功
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUpdateResponse'
              examples:
                default:
                  summary: 更新成功
                  value:
                    success: true
                    code: "OK"
                    message: "管理者情報を更新しました。"
                    data:
                      adminId: "123"
                    requestId: "req_admin_update_ok"
                    timestamp: "2026-04-03T11:00:00.000Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/InvalidSession'
        '403':
          $ref: '#/components/responses/adminUpdateForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/ConflictAdmin'
        '500':
          $ref: '#/components/responses/InternalServerErrorServerErrorOnly'

    delete:
      tags:
        - Admin / Admins
      summary: 管理者削除
      operationId: deleteAdmin
      description: |
        指定した管理者IDのアカウントを削除する。<br>
        本APIの削除は論理削除とする。<br>
        ログイン中の管理者自身は削除できない。
      security:
        - Cookie_ln_admin_sid: []
          Cookie_admin_status: []
          CsrfTokenInHeader: []
      parameters:
        - $ref: '#/components/parameters/AdminIdPath'
        - $ref: '#/components/parameters/CsrfTokenHeader'
      responses:
        '200':
          description: 管理者削除成功
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDeleteResponse'
              examples:
                default:
                  summary: 削除成功
                  value:
                    success: true
                    code: "OK"
                    message: "管理者アカウントを削除しました。"
                    data:
                      adminId: "123"
                    requestId: "req_admin_delete_ok"
                    timestamp: "2026-04-03T11:00:00.000Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/InvalidSession'
        '403':
          $ref: '#/components/responses/adminDeleteForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerErrorServerErrorOnly'
  /api/admin/admins/otp:
    get:
      tags:
        - Admin / Admins
      summary: ワンタイムパスワード有効期限確認
      description: |
        ワンタイムパスワードの有効期限を YYYY-MM-DDY
        Thh:mm:ssZ の形式で返却する 
        セッションから管理者を特定できない場合, 有効期限が null の場合はセッションエラーとして返却する
      security:
        - Cookie_ln_admin_sid: []
        - Cookie_admin_status: []
      responses:
        '200':
          description: OTP有効期限取得
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpExpiresAtCheckResponse'
              examples:
                otpSend:
                  summary: OTP有効期限取得完了
                  value:
                    success: true
                    code: "OK"
                    message: "OTP有効期限取得完了"
                    data:
                      expiresAt: "2025-12-14T12:55:00.000Z"
                    meta: {}
                    requestId: "req_otp_send"
                    timestamp: "2025-12-14T12:50:00.000Z"
        '401':
          $ref: '#/components/responses/InvalidSession'
        '500':
          $ref: '#/components/responses/InternalServerErrorServerErrorOnly' 
    post:
      tags:
        - Admin / Admins
      summary: ワンタイムパスワード送信
      description: |
        管理者アカウント（仮登録）で初回ログイン時に、ワンタイムパスワード認証を求められる。<br>
        その際、登録したメールアドレス宛にワンタイムパスワードを送信するAPI
      security:
        - Cookie_ln_admin_sid: []
        - Cookie_admin_status: []
        - CsrfTokenInHeader: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      responses:
        '200':
          description: OTP送信完了（再送含む）
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSendSuccessResponse'
              examples:
                otpSend:
                  summary: OTP送信完了（再送含む）
                  value:
                    success: true
                    code: "OK"
                    message: "OTP送信完了"
                    data:
                      nextPath: "/login/first/otp/verify"
                      otpDeliveryAddress: "linknest@otp-delivery.com"
                      expiresAt: "2025-12-14T12:55:00.000Z"
                    meta:
                      csrfToken: "csrf_token"
                    requestId: "req_otp_send"
                    timestamp: "2025-12-14T12:50:00.000Z"
        '400':
          $ref: '#/components/responses/CsrfMissing'
        '401':
          $ref: '#/components/responses/InvalidSession'
        '403':
          $ref: '#/components/responses/CsrfForbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags:
        - Admin / Admins
      summary: ワンタイムパスワード検証
      description: |
        Request Body に含まれる otp を用いてワンタイムパスワードの検証を行う。

        ■OTP検証前段階の処理
        - otpが /^\d{6}$/ にマッチしない場合 : 400 / BAD_REQUEST
        - ln_admin_sid, admin_status が未送信 / 検証失敗 : 401 / UNAUTHORIZED
        - x-csrf-token が未送信 : 400 / CSRF_MISSING_HEADER
        - x-csrf-token の検証に失敗 : 403 / CSRF_FORBIDDEN

        ■OTP検証の結果による処理
        - otp の検証に失敗 : 401 / OTP_UNAUTHORIZED
        - otp の検証に失敗（5回以上） : 423 / MAX_REQUEST
        - otp の検証に成功 : 200 / OK ※ ln_admin_sid, status_id, x-csrf-token を新たに発行
      security:
        - Cookie_ln_admin_sid: []
        - Cookie_admin_status: []
        - CsrfTokenInHeader: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtp'
      responses:
        '200':
          description: OTP認証成功
          headers:
            Set-Cookie:
              $ref: '#/components/headers/AdminSessionCookie'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpVerifySuccessResponse'
              examples:
                otpVerified:
                  summary: OTP認証成功
                  value:
                    success: true
                    code: "OK"
                    message: "OTP認証に成功しました"
                    data:
                      nextPath: "/login/first/completed"
                      admin:
                        id: 89
                        email: "otp-verified@linknest.com"
                        displayName: "OTP認証成功管理者"
                    meta:
                      csrfToken: "new-csrf-token"
                    requestId: "otp-verified-id"
                    timestamp: "2025-10-27T10:45:12.345Z"
        '400':
          $ref: '#/components/responses/BadRequestAndCsrfMissing'
        '401':
          $ref: '#/components/responses/InvalidSessionAndInvalidOtp'
        '403':
          $ref: '#/components/responses/CsrfForbidden'
        '423':
          $ref: '#/components/responses/OtpMaxRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/admin-statuses:
    get:
      tags:
        - Admin / Admin-Statuses
      summary: 管理者ステータスマスタ取得
      operationId: getAdminStatuses
      description: |
        管理者ステータスマスタを取得する。<br>
        一覧画面の検索条件および編集画面のプルダウン表示に利用する。
      security:
        - Cookie_ln_admin_sid: []
          Cookie_admin_status: []
      responses:
        '200':
          description: 管理者ステータスマスタ取得成功
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatusMasterResponse'
              examples:
                default:
                  summary: 取得成功
                  value:
                    success: true
                    code: "OK"
                    message: "管理者ステータスマスタを取得しました。"
                    data:
                      items:
                        - statusId: 1
                          label: "仮登録"
                          isLocked: false
                          displayLabel: "仮登録"
                        - statusId: 2
                          label: "仮登録"
                          isLocked: true
                          displayLabel: "仮登録（ロック中）"
                        - statusId: 3
                          label: "本登録"
                          isLocked: false
                          displayLabel: "本登録"
                        - statusId: 4
                          label: "本登録"
                          isLocked: true
                          displayLabel: "本登録（ロック中）"
                    meta: {}
                    requestId: "req_admin_statuses_ok"
                    timestamp: "2026-04-03T11:00:00.000Z"
        '401':
          $ref: '#/components/responses/InvalidSession'
        '500':
          $ref: '#/components/responses/InternalServerErrorServerErrorOnly'
components:
  securitySchemes:
    Cookie_ln_admin_sid:
      type: apiKey
      in: cookie
      name: ln_admin_sid
      description: HttpOnly クッキーに保持する管理者セッションID
    Cookie_admin_status:
      type: apiKey
      in: cookie
      name: admin_status
      description: HttpOnly クッキーに保持する管理者ステータス
    CsrfTokenInHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: 直前の成功レスポンス `meta.csrfToken` に含まれていた CSRF トークン

  schemas:
    # ===== 共通エンベロープ =====
    ApiSuccessBase:
      type: object
      required: [success, code, requestId, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        code:
          type: string
          example: OK | CREATED
        message:
          type: string
          example: 成功しました。
        requestId:
          type: string
          example: req_abc123
        timestamp:
          type: string
          format: date-time
          example: '2025-10-27T10:45:12.345Z'
        meta:
          $ref: '#/components/schemas/Meta'

    ApiError:
      type: object
      required: [success, code, message, requestId, timestamp]
      properties:
        success:
          type: boolean
          enum: [false]
        code:
          type: string
          example: UNAUTHORIZED | OTP_UNAUTHORIZED | MAX_REQUEST | CSRF_FORBIDDEN
        message:
          type: string
          example: セッションが無効です。
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
        details:
          type: object
          additionalProperties: true
          example:
            nextPath: /login
        requestId:
          type: string
          example: req_def456
        timestamp:
          type: string
          format: date-time
          example: '2025-10-27T10:45:12.678Z'

    FieldError:
      type: object
      required: [field, reason]
      properties:
        field:
          type: string
          example: email
          description: '$ はボディ全体等の表現に利用'
        reason:
          type: string
          example: invalid_format
        message:
          type: string
          example: メールアドレスの形式が不正です。

    Meta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        perPage:
          type: integer
        nextCursor:
          type: string
        csrfToken:
          type: string
          description: CSRFトークン。認証が必要なAPI呼び出し時に `X-CSRF-Token` ヘッダへ付与する。
          example: "csrf_token"

    # ===== data（成功時dataの中身） =====
    SessionStatusData:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
          example: true
          description: セッションが有効かどうか
        expiresAt:
          type: string
          format: date-time
          example: '2025-08-19T07:33:00Z'
          description: セッション失効予定時刻（返却は任意）
        admin:
          $ref: '#/components/schemas/AdminSessionPublic' # (返却は任意)

    LoginSuccessData:
      type: object
      required: [nextPath, admin]
      properties:
        nextPath:
          $ref: '#/components/schemas/NextPath'
        admin:
          $ref: '#/components/schemas/AdminPublic'

    OtpExpiresAtCheckData:
      type: object
      required:
        - expiresAt
      properties:
        expiresAt:
          type: string
          format: date-time
          example: "2025-12-14T12:50:00.000Z"
          description: OTP有効期限

    OtpRequiredData:
      type: object
      required: [nextPath, otpDeliveryAddress]
      properties:
        nextPath:
          $ref: '#/components/schemas/NextPath'
        otpDeliveryAddress:
          type: string
          format: email
          example: linknest@example.com
          description: OTP送信先メールアドレス

    RegisterSuccessData:
      type: object
      required: [nextPath]
      properties:
        nextPath:
          $ref: '#/components/schemas/NextPath'

    OtpSendSuccessData:
      type: object
      required:
        - nextPath
        - otpDeliveryAddress
        - expiresAt
      properties:
        nextPath:
          $ref: '#/components/schemas/NextPath'
        otpDeliveryAddress:
          type: string
          format: email
          example: linknest@otp-delivery.com
          description: OTP送信先のメールアドレス
        expiresAt:
          type: string
          format: date-time
          example: "2025-12-14T12:50:00.000Z"
          description: OTP有効期限

    OtpVerifySuccessData:
      type: object
      required: [nextPath, admin]
      properties:
        nextPath:
          $ref: '#/components/schemas/NextPath'
        admin:
          $ref: '#/components/schemas/AdminPublic'

    RefreshData:
      type: object
      required: [refreshed, expiresAt]
      properties:
        refreshed:
          type: boolean
          example: true
        expiresAt:
          type: string
          format: date-time
          example: '2025-08-19T10:00:00Z'

    # ===== 追加: セッション取得専用の管理者公開情報（adminStatusあり） =====
    AdminSessionPublic:
      type: object
      required: [adminStatus, id, email, displayName]
      properties:
        adminStatus:
          type: integer
          example: 3
          description: 管理者ステータス（例：1=pre-otp, 3=本登録 など）
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: linknest@example.com
        displayName:
          type: string
          example: 管理者太郎

    AdminPublic:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: linknest@example.com
        displayName:
          type: string
          example: 管理者太郎

    NextPath:
      type: string
      example: /top

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: linknest@example.com
        password:
          type: string
          format: password
          example: Asdf12345!

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: linknest@register.com
        password:
          type: string
          format: password
          minLength: 6
          maxLength: 20
          description: |
            パスワード要件:
            - 6〜20文字
            - 大文字(A-Z)を1文字以上含む
            - 小文字(a-z)を1文字以上含む
            - 許可記号を1文字以上含む
            許可記号: !"#$%&'()*+,-./:;<=>?@[]^_`{|}~
          pattern: "^(?=.{6,20}$)(?=.*[A-Z])(?=.*[a-z])(?=.*[!\"#$%&'()*+,\\-./:;<=>?@\\[\\]^_`{|}~])[A-Za-z0-9!\"#$%&'()*+,\\-./:;<=>?@\\[\\]^_`{|}~]+$"
          example: "Abc!def"

    VerifyOtp:
      type: object
      required:
        - otp
      properties:
        otp:
          type: string
          minLength: 6
          maxLength: 6
          description: |
            初回ログイン時・OTP認証の際に送信する
            OTPは数字6桁
          pattern: '^\d{6}$'
          example: "123456"

    # ===== 各エンドポイントのレスポンス（envelope付き） =====
    SessionStatusResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/SessionStatusData'

    LoginSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/LoginSuccessData'

    OtpExpiresAtCheckResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/OtpExpiresAtCheckData'
    OtpRequiredResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/OtpRequiredData'
              


    RefreshResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/RefreshData'

    RegisterSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/RegisterSuccessData'

    OtpSendSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/OtpSendSuccessData'

    OtpVerifySuccessResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/OtpVerifySuccessData'
    
    AdminListItemStatus:
      type: object
      required: [statusId, label, isLocked, displayLabel]
      properties:
        statusId:
          type: integer
          example: 3
        label:
          type: string
          example: 本登録
        isLocked:
          type: boolean
          example: false
        displayLabel:
          type: string
          example: 本登録

    AdminListItem:
      type: object
      required:
        - adminId
        - email
        - displayName
        - status
        - createdAt
        - isMe
      properties:
        adminId:
          type: string
          example: 12
        email:
          type: string
          format: email
          example: linknest@example.com
        displayName:
          type: string
          example: テスト管理者
        status:
          $ref: '#/components/schemas/AdminListItemStatus'
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-02-08T12:34:56.000Z"
          description: NULL の場合は未ログイン
        createdAt:
          type: string
          format: date-time
          example: "2026-01-15T09:00:00.000Z"
        isMe:
          type: boolean
          example: false
          description: ログイン中の管理者自身かどうか

    AdminListData:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminListItem'

    AdminListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/AdminListData'

    AdminDetailStatus:
      type: object
      required: [statusId, label, isLocked, displayLabel]
      properties:
        statusId:
          type: integer
          example: 3
        label:
          type: string
          example: 本登録
        isLocked:
          type: boolean
          example: false
        displayLabel:
          type: string
          example: 本登録

    AdminDetailAdmin:
      type: object
      required:
        - adminId
        - email
        - displayName
        - status
        - createdAt
        - updatedAt
        - isMe
      properties:
        adminId:
          type: string
          example: "12"
        email:
          type: string
          format: email
          example: hisamatsu@example.com
        displayName:
          type: string
          example: 久松
        status:
          $ref: '#/components/schemas/AdminDetailStatus'
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-02-08T12:34:56.000Z"
        createdAt:
          type: string
          format: date-time
          example: "2026-01-01T09:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-02-08T13:00:00.000Z"
        isMe:
          type: boolean
          example: false

    AdminDetailSecurity:
      type: object
      required:
        - otpFailureCount
        - loginFailureCount
      properties:
        otpExpiredAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-02-08T12:34:56.000Z"
        otpFailureCount:
          type: integer
          example: 0
        loginFailureCount:
          type: integer
          example: 1
        lastLoginFailedAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-02-08T11:50:00.000Z"
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-02-08T12:34:56.000Z"

    AdminLoginLogItem:
      type: object
      required:
        - occurredAt
        - status
        - statusLabel
        - ipAddress
        - userAgent
      properties:
        occurredAt:
          type: string
          format: date-time
          example: "2026-02-08T12:34:56.000Z"
        status:
          type: string
          enum: [success, failure]
          example: success
        statusLabel:
          type: string
          example: 成功
        ipAddress:
          type: string
          example: "192.168.0.1"
        userAgent:
          type: string
          example: "Mozilla/5.0 ..."

    AdminDetailPermissions:
      type: object
      required: [canEdit, canDelete]
      properties:
        canEdit:
          type: boolean
          example: true
        canDelete:
          type: boolean
          example: true

    AdminDetailData:
      type: object
      required:
        - admin
        - security
        - loginLogs
        - permissions
      properties:
        admin:
          $ref: '#/components/schemas/AdminDetailAdmin'
        security:
          $ref: '#/components/schemas/AdminDetailSecurity'
        loginLogs:
          type: array
          items:
            $ref: '#/components/schemas/AdminLoginLogItem'
        permissions:
          $ref: '#/components/schemas/AdminDetailPermissions'

    AdminDetailResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/AdminDetailData'

    AdminUpdateRequest:
      type: object
      required:
        - email
        - displayName
        - statusId
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          example: updated@example.com
        displayName:
          type: string
          minLength: 1
          maxLength: 255
          example: 更新後表示名
        statusId:
          type: integer
          example: 3

    AdminUpdateData:
      type: object
      required: [adminId]
      properties:
        adminId:
          type: string
          example: "123"

    AdminUpdateResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/AdminUpdateData'

    AdminDeleteData:
      type: object
      required: [adminId]
      properties:
        adminId:
          type: string
          example: "123"

    AdminDeleteResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/AdminDeleteData'
  
    AdminStatusMasterItem:
      type: object
      required:
        - statusId
        - label
        - isLocked
        - displayLabel
      properties:
        statusId:
          type: integer
          example: 1
        label:
          type: string
          example: 仮登録
        isLocked:
          type: boolean
          example: false
        displayLabel:
          type: string
          example: 仮登録

    AdminStatusMasterData:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminStatusMasterItem'

    AdminStatusMasterResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/AdminStatusMasterData'
  
  parameters:
    CsrfTokenHeader:
      name: X-CSRF-Token
      in: header
      required: true
      description: |
        CSRF対策用ヘッダ。直前の成功レスポンスの `meta.csrfToken` に含まれていたトークンをそのまま設定する。
      schema:
        type: string
        minLength: 32
        pattern: '^[A-Za-z0-9\-_]{32,}$'   # base64url 等を想定
    AdminIdQuery:
      name: adminId
      in: query
      required: false
      description: 管理者ID（完全一致）
      schema:
        type: string
        pattern: '^\d{1,19}$'
        example: "123"

    AdminEmailQuery:
      name: email
      in: query
      required: false
      description: メールアドレス（前方一致・大文字小文字区別）
      schema:
        type: string
        maxLength: 200
        example: "linknest"

    AdminDisplayNameQuery:
      name: displayName
      in: query
      required: false
      description: 表示名（前方一致）
      schema:
        type: string
        maxLength: 200
        example: "久松"

    AdminStatusIdQuery:
      name: statusId
      in: query
      required: false
      description: ステータスID
      schema:
        type: integer
        minimum: 1
        example: 3

    AdminSortByQuery:
      name: sortBy
      in: query
      required: false
      description: ソート対象カラム
      schema:
        type: string
        enum:
          - adminId
          - email
          - displayName
          - statusId
          - lastLoginAt
          - createdAt
        default: adminId
        example: adminId

    AdminSortOrderQuery:
      name: sortOrder
      in: query
      required: false
      description: ソート順
      schema:
        type: string
        enum: [asc, desc]
        default: desc
        example: desc

    PageQuery:
      name: page
      in: query
      required: false
      description: ページ番号
      schema:
        type: integer
        minimum: 1
        default: 1
        example: 1

    PerPageQuery:
      name: perPage
      in: query
      required: false
      description: 1ページあたりの件数（現時点では20固定想定）
      schema:
        type: integer
        enum: [20]
        default: 20
        example: 20
    
    AdminIdPath:
      name: adminId
      in: path
      required: true
      description: 管理者ID
      schema:
        type: string
        pattern: '^\d{1,19}$'
        example: "123"


  headers:
    NoStore:
      description: ブラウザ / プロキシにキャッシュさせない
      schema:
        type: string
        example: no-store
    # 以下Cookieに関するheader
    # Set-Cookie は複数行返る可能性あり（本ヘッダは代表記述）
    AdminSessionCookie:
      description: |
        Cookieのセット（ログイン成功時: 200/202 等。admin_status の値は状態により変化）
        ```
        ln_admin_sid={ln_admin_sid}; Path=/; HttpOnly; Secure; SameSite=<see note>; Max-Age=1800
        admin_status={admin_status}; Path=/; HttpOnly; Secure; SameSite=<see note>; Max-Age=1800
        ```
        ```
        - HttpOnly: true
        - Secure: true（開発環境はfalse, 開発環境もHTTPS適用後にtrue運用）
        - Path: /
        - SameSite: None
        ※ドメインを同一にする場合はLaxに変更
        ```
      schema:
        type: string

  responses:
    BadRequest:
      description: バリデーションエラー等不正なリクエスト
      headers:
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            invalidInput:
              value:
                success: false
                code: "BAD_REQUEST"
                message: "不正な入力値です。"
                details: {}
                requestId: "req_bad_400"
                timestamp: "2025-10-27T10:45:12.901Z"
    CsrfMissing:
      description: CSRF ヘッダ未送信 # 400error
      headers:
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            csrfMissingHeader:
              summary: CSRF ヘッダ未送信
              value:
                success: false
                code: "CSRF_MISSING_HEADER"
                message: "X-CSRF-Token required"
                details: {}
                requestId: "req_csrf_miss_hdr"
                timestamp: "2025-10-27T10:45:12.901Z"
    BadRequestAndCsrfMissing:
      description: バリデーションエラー & CSRFヘッダー未送信エラー
      headers:
        Cache-Control:
