openapi: '3.0.3'

info:
  title: Linknest 管理者 API
  description: |
    ## Linknest 管理者 API仕様書（envelope対応）
    - すべてのJSONレスポンスを、共通エンベロープ（success/code/message/requestId/timestamp）に統一。
    - 成功時は `data`（必要に応じて `meta`）を返却。失敗時は `errors`/`details` を返却。
    ---
    ## サーバに関して
    現在は開発環境しか用意していないためAPIのテストも開発環境でのみ行う。<br>
    今後準本番（stg）や本番（prod）環境を作成次第テスト実施予定。
  version: '1.0.0'

servers:
  - url: http://localhost:5000
    description: 開発環境URL

tags:
  - name: Admin Session
    description: 管理者セッション（ログイン/ログアウト/セッション確認）
  - name: Server Running Test
    description: サーバ疎通確認用

paths:
  /api/admin/session:
    get:
      tags:
        - Admin Session
      summary: 管理者ログインチェック
      operationId: adminLoginCheck
      description: |
        Cookie `ln_admin_sid` を検証し、セッションの有効性（valid）を返す。<br>
        このエンドポイントでは原則 Set-Cookie を返さない。<br>
        response 500 の場合発生するのは InternalServerError のみ<br>
        ※component の関係でその他の500error の例が載っています。
      security:
        - CookieAuth: []
      responses:
        '200':
          description: 有効なセッション
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStatusResponse'
              examples:
                fullSession:
                  summary: 通常（full）セッション
                  value:
                    success: true
                    code: "OK"
                    message: "有効なセッションです"
                    data:
                      valid: true
                      expiresAt: "2025-08-18T06:00:00Z"
                      admin:
                        id: 2
                        email: "linknest@example.com"
                        displayName: "テスト管理者"
                    meta: {}
                    requestId: "req_abc123"
                    timestamp: "2025-10-27T10:45:12.345Z"
                preOtpSession:
                  summary: pre-otpセッション（初回ログイン時・OTP未完了）
                  value:
                    success: true
                    code: "OK"
                    message: "有効なセッションです"
                    data:
                      valid: true
                      expiresAt: "2025-08-18T06:00:00Z"
                      admin:
                        id: 3
                        email: "first-login@example.com"
                        displayName: "初回ログインテスト管理者"
                    meta: {}
                    requestId: "req_abc234"
                    timestamp: "2025-10-27T10:45:12.345Z"
        '401':
          $ref: '#/components/responses/InvalidSession'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Admin Session
      summary: 管理者ログイン
      operationId: adminLogin
      description: |
        認証に成功するとサーバ側でセッションを作成し、`HttpOnly`クッキーとして返却する。<br>
        OTP必須のユーザは202で応答し、OTP入力画面へ誘導する。<br>
        CSRFトークンはレスポンスの `meta.csrfToken` に含めて返却する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              normal:
                summary: 正常ログイン
                value:
                  email: linknest@example.com
                  password: Asdf1234!
              wrongPassword:
                summary: 認証失敗（パスワード間違い）
                value:
                  email: linknest@example.com
                  password: wrongPassword
      responses:
        '200':
          description: ログイン成功・セッション確立
          headers:
            Set-Cookie:
              $ref: '#/components/headers/AdminSessionCookie'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
              examples:
                normal:
                  value:
                    success: true
                    code: "OK"
                    message: "ログインに成功しました。"
                    data:
                      nextPath: "/top"
                      admin:
                        id: 2
                        email: "linknest@example.com"
                        displayName: "テスト管理者"
                    meta:
                      csrfToken: "csrf_token"
                    requestId: "req_login_ok"
                    timestamp: "2025-10-27T10:45:12.345Z"
        '202':
          description: |
            OTP認証が必要（初回ログイン時等）<br>
            初回ログイン時のセッションを確立。<br>
            ※初回ログイン完了時はセッションをローテーション（Session Fixation対策）。<br>
            CSRFトークンはレスポンスの `meta.csrfToken` に含めて返却する。
          headers:
            Set-Cookie:
              $ref: '#/components/headers/AdminSessionCookie'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpRequiredResponse'
              examples:
                first_login:
                  value:
                    success: true
                    code: "OK"
                    message: "OTP認証が必要です"
                    data:
                      nextPath: "/login/first/otp/send"
                      otpDeliveryAddress: "linknest@example.com"
                    meta:
                      csrfToken: "csrf_token"
                    requestId: "req_login_otp"
                    timestamp: "2025-10-27T10:45:12.345Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '423':
          $ref: '#/components/responses/MaxRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Admin Session
      summary: ログアウト
      description: |
        サーバ側のセッションを無効化し、Cookieを削除する。<br>
        成功時は204(No Content)を返し、クライアントをログイン画面へ誘導する。<br>
        リクエスト時には直前に発行された CSRF トークンを `X-CSRF-Token` ヘッダに付与する。
      security:
        - CookieAuth: []
        - CsrfTokenInHeader: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      responses:
        '204':
          description: ログアウト成功
          headers:
            Set-Cookie:
              description: セッションCookie削除
              schema:
                type: string
                example: "ln_admin_sid=; Path=/; HttpOnly; Secure; SameSite=None; Max-Age=0"
            Cache-Control:
              $ref: '#/components/headers/NoStore'
        '400':
          $ref: '#/components/responses/CsrfMissing'
        '401':
          $ref: '#/components/responses/InvalidSession'
        '403':
          $ref: '#/components/responses/CsrfForbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/admin/session/refresh:
    post:
      tags:
        - Admin Session
      summary: セッション延長（スライディング） / CSRFトークンのローテーション
      description: |
        有効なセッションおよび有効な CSRF トークンがある場合に、セッション有効期限を延長する。<br>
        CSRFトークンは毎回新しい値を発行し、レスポンスの `meta.csrfToken` に返却する。<br>
        ※2xxの場合のみ CSRF トークンをローテーションする。
      security:
        - CookieAuth: []
        - CsrfTokenInHeader: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      responses:
        '200':
          description: セッション延長（延長が不要でも CSRF は毎回ローテーション）
          headers:
            Set-Cookie:
              $ref: '#/components/headers/AdminSessionCookie' # 必要時のみ新規で発行
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
              examples:
                refreshed:
                  value:
                    success: true
                    code: "OK"
                    message: "セッションを延長しました"
                    data:
                      refreshed: true
                      expiresAt: "2025-08-19T10:00:00Z"
                    meta:
                      csrfToken: "new_csrf_token"
                    requestId: "req_refresh_ok"
                    timestamp: "2025-10-27T10:45:12.345Z"
        '400':
          $ref: '#/components/responses/CsrfMissing'
        '401':
          $ref: '#/components/responses/InvalidSession'
        '403':
          $ref: '#/components/responses/CsrfForbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: ln_admin_sid
      description: HttpOnly クッキーに保持する管理者セッションID
    CsrfTokenInHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: 直前の成功レスポンス `meta.csrfToken` に含まれていた CSRF トークン

  schemas:
    # ===== 共通エンベロープ =====
    ApiSuccessBase:
      type: object
      required: [success, code, requestId, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        code:
          type: string
          example: OK
        message:
          type: string
          example: 成功しました。
        requestId:
          type: string
          example: req_abc123
        timestamp:
          type: string
          format: date-time
          example: '2025-10-27T10:45:12.345Z'
        meta:
          $ref: '#/components/schemas/Meta'

    ApiError:
      type: object
      required: [success, code, message, requestId, timestamp]
      properties:
        success:
          type: boolean
          enum: [false]
        code:
          type: string
          example: UNAUTHORIZED
        message:
          type: string
          example: セッションが無効です。
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
        details:
          type: object
          additionalProperties: true
          example:
            nextPath: /login
        requestId:
          type: string
          example: req_def456
        timestamp:
          type: string
          format: date-time
          example: '2025-10-27T10:45:12.678Z'

    FieldError:
      type: object
      required: [field, reason]
      properties:
        field:
          type: string
          example: email
          description: '$ はボディ全体等の表現に利用'
        reason:
          type: string
          example: invalid_format
        message:
          type: string
          example: メールアドレスの形式が不正です。

    Meta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        perPage:
          type: integer
        nextCursor:
          type: string
        csrfToken:
          type: string
          description: CSRFトークン。認証が必要なAPI呼び出し時に `X-CSRF-Token` ヘッダへ付与する。
          example: "csrf_token"

    # ===== data（成功時dataの中身） =====
    SessionStatusData:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
          example: true
          description: セッションが有効かどうか
        expiresAt:
          type: string
          format: date-time
          example: '2025-08-19T07:33:00Z'
          description: セッション失効予定時刻（返却は任意）
        admin:
          $ref: '#/components/schemas/AdminPublic' # (返却は任意)

    LoginSuccessData:
      type: object
      required: [nextPath, admin]
      properties:
        nextPath:
          $ref: '#/components/schemas/NextPath'
        admin:
          $ref: '#/components/schemas/AdminPublic'

    OtpRequiredData:
      type: object
      required: [nextPath, otpDeliveryAddress]
      properties:
        nextPath:
          $ref: '#/components/schemas/NextPath'
        otpDeliveryAddress:
          type: string
          format: email
          example: linknest@example.com
          description: OTP送信先メールアドレス

    RefreshData:
      type: object
      required: [refreshed, expiresAt]
      properties:
        refreshed:
          type: boolean
          example: true
        expiresAt:
          type: string
          format: date-time
          example: '2025-08-19T10:00:00Z'

    AdminPublic:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: linknest@example.com
        displayName:
          type: string
          example: 管理者太郎

    NextPath:
      type: string
      example: /top

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: linknest@example.com
        password:
          type: string
          format: password
          example: Asdf12345!

    # ===== 各エンドポイントのレスポンス（envelope付き） =====
    SessionStatusResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/SessionStatusData'

    LoginSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/LoginSuccessData'

    OtpRequiredResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/OtpRequiredData'

    RefreshResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/RefreshData'

  parameters:
    CsrfTokenHeader:
      name: X-CSRF-Token
      in: header
      required: true
      description: |
        CSRF対策用ヘッダ。直前の成功レスポンスの `meta.csrfToken` に含まれていたトークンをそのまま設定する。
      schema:
        type: string
        minLength: 32
        pattern: '^[A-Za-z0-9\-_]{32,}$'   # base64url 等を想定

  headers:
    NoStore:
      description: ブラウザ / プロキシにキャッシュさせない
      schema:
        type: string
        example: no-store
    # 以下Cookieに関するheader
    # Set-Cookie は複数行返る可能性あり（本ヘッダは代表記述）
    AdminSessionCookie:
      description: |
        セッションID Cookie
        ▼example
        `ln_admin_sid={session}; Path=/; HttpOnly; Secure; SameSite=<see note>; Max-Age=1800`
        - HttpOnly: true
        - Secure: true（開発環境はfalse, 開発環境もHTTPS適用後にtrue運用）
        - Path: /
        - SameSite: None
        ※ドメインを同一にする場合はLaxに変更
      schema:
        type: string

  responses:
    BadRequest:
      description: バリデーションエラー等不正なリクエスト
      headers:
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            invalidInput:
              value:
                success: false
                code: "BAD_REQUEST"
                message: "不正な入力値です。"
                details: {}
                requestId: "req_bad_400"
                timestamp: "2025-10-27T10:45:12.901Z"
    CsrfMissing:
      description: CSRF ヘッダ未送信 # 400error
      headers:
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            csrfMissingHeader:
              summary: CSRF ヘッダ未送信
              value:
                success: false
                code: "CSRF_MISSING_HEADER"
                message: "X-CSRF-Token required"
                details: {}
                requestId: "req_csrf_miss_hdr"
                timestamp: "2025-10-27T10:45:12.901Z"
    CsrfForbidden:
      description: CSRFトークン検証エラー / 値不一致時・または有効期限切れ # 403 error
      headers:
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            csrfForbidden:
              summary: CSRFトークン検証エラー
              value:
                success: false
                code: "CSRF_FORBIDDEN"
                message: "CSRFトークンが無効です。"
                details: {}
                requestId: "req_csrf_forbidden"
                timestamp: "2025-10-27T10:45:12.901Z"
    InternalServerError:
      description: サーバエラー
      headers:
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            CsrfIssuanceFailed:
              summary: CSRF発行失敗
              value:
                success: false
                code: "CSRF_ISSUANCE_FAILED"
                message: "Cannot issue CSRF"
                details: {}
                requestId: "req_csrf_issue_fail"
                timestamp: "2025-10-27T10:45:12.901Z"
            SidIssuanceFailed:
              summary: session id 発行失敗
              value:
                success: false
                code: "LN_ADMIN_SID_ISSUANCE_FAILED"
                message: "Cannot issue ln_admin_sid"
                details: {}
                requestId: "req_sid_issue_fail"
                timestamp: "2025-10-27T10:45:12.901Z"
            InternalServerError:
              summary: サーバーエラー（原因不明）
              value:
                success: false
                code: "INTERNAL_SERVER_ERROR"
                message: |
                  現在、サーバーエラーが発生しています。
                  お手数ですが、一定時間経過後に再度ログインをお願いします。
                details: {}
                requestId: "req_ise"
                timestamp: "2025-10-27T10:45:12.901Z"
    InvalidSession:
      description: セッションが無効（未ログイン / 期限切れ / リボーク済み）
      headers:
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            haveNoSession:
              summary: 無効なセッション
              value:
                success: false
                code: "UNAUTHORIZED"
                message: "セッションが無効です。"
                details:
                  nextPath: "/login"
                requestId: "req_def456"
                timestamp: "2025-10-27T10:45:12.678Z"
    MaxRequest:
      description: |
        アカウントロック時（本登録・初回登録問わず）
            - 本登録時
            ```
            現在アカウントがロックされています。
            ○○時○○分以降に再度ログインをお試しください。
            ```
            - 初回登録・OTP上限入力後
            ```
            ワンタイムパスワード入力制限に達しました。

            このメールアドレスでのアカウント登録は48時間できません。

            48時間経過後に再度ご登録お願いします。
            ```
      headers:
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            ログイン失敗可能回数上限到達時（5回）:
              value:
                success: false
                code: "MAX_REQUEST"
                message:
                  "現在アカウントがロックされています。\n{retryTime}以降に再度ログインをお試しください。"
                details:
                  retryAfterAt: "2025-10-27T10:45:12.901Z"
                requestId: "req_lock_423"
                timestamp: "2025-10-27T10:45:12.901Z"
            初回ログイン時・OTP認証失敗上限到達時:
              value:
                success: false
                code: "MAX_REQUEST"
                message: "ワンタイムパスワード入力制限に達しました。\n\nこのメールアドレスでのアカウント登録は48時間できません。\n\n48時間経過後に再度ご登録お願いします。"
                details: {}
                requestId: "req_lock_first_423"
                timestamp: "2025-10-27T10:45:12.901Z"
    Unauthorized:
      description: 認証失敗
      headers:
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            unauthorized:
              summary: 認証失敗
              value:
                success: false
                code: "UNAUTHORIZED"
                message: "ID（メールアドレス）またはパスワードが異なります。"
                details: {}
                requestId: "req_unauth_401"
                timestamp: "2025-10-27T10:45:12.901Z"
